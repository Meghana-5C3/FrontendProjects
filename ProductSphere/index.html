<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        ShopSphere
    </title>

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="top-nav">

            <!-- LOGO -->

            <div class="logo">

                <i class="fa-solid fa-cart-shopping"></i>

                ShopSphere

            </div>

            <!-- SEARCH -->

            <div class="search-box">

                <input type="text"
                    id="searchInput"
                    placeholder="Search products...">

                <button>

                    <i class="fa-solid fa-magnifying-glass"></i>

                </button>

            </div>

            <!-- NAV -->

            <div class="nav-icons">

                <div>

                    <p>Hello, User</p>

                    <h4>Account</h4>

                </div>

                <div>

                    <p>Returns</p>

                    <h4>& Orders</h4>

                </div>

                <!-- CART -->

                <div class="cart-icon">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span id="cartCount">

                        0

                    </span>

                </div>

            </div>

        </div>

    </header>

    <!-- HERO -->

    <section class="hero-section">

        <div class="hero-content">

            <h1>

                Mega Shopping Sale

            </h1>

            <p>

                Discover trending products with amazing offers.

            </p>

            <button>

                Shop Now

            </button>

        </div>

    </section>

    <!-- FILTER SECTION -->

    <section class="filter-section">

        <!-- CATEGORIES -->

        <div class="categories">

            <button class="category-btn active"
                data-category="all">

                All

            </button>

            <button class="category-btn"
                data-category="electronics">

                Electronics

            </button>

            <button class="category-btn"
                data-category="fashion">

                Fashion

            </button>

            <button class="category-btn"
                data-category="gaming">

                Gaming

            </button>

            <button class="category-btn"
                data-category="shoes">

                Shoes

            </button>

        </div>

        <!-- FILTERS -->

        <div class="filters">

            <!-- PRICE -->

            <select id="priceFilter">

                <option value="all">

                    All Prices

                </option>

                <option value="1000">

                    ₹1000 - ₹2000

                </option>

                <option value="2000">

                    ₹2000 - ₹3500

                </option>

                <option value="3500">

                    ₹3500 - ₹5000

                </option>

            </select>

            <!-- SORT -->

            <select id="sortFilter">

                <option value="default">

                    Sort Products

                </option>

                <option value="price-low">

                    Price Low to High

                </option>

                <option value="price-high">

                    Price High to Low

                </option>

                <option value="rating-high">

                    Highest Rating

                </option>

            </select>

        </div>

    </section>

    <!-- PRODUCTS -->

    <section class="products-grid"
        id="productsGrid">

    </section>

    <!-- CART SIDEBAR -->

    <div class="cart-sidebar"
        id="cartSidebar">

        <div class="cart-header">

            <h2>

                Shopping Cart

            </h2>

            <button id="closeCart">

                ✕

            </button>

        </div>

        <div id="cartItems">

        </div>

        <div class="cart-footer">

            <h3>

                Total:
                ₹<span id="cartTotal">

                    0

                </span>

            </h3>

            <button class="checkout-btn">

                Proceed to Checkout

            </button>

        </div>

    </div>

    <!-- TOAST -->

    <div class="toast"
        id="toast">

        Product Added to Cart

    </div>

    <!-- FOOTER -->

    <footer class="footer">

        <h2>

            ShopSphere

        </h2>

        <p>

            Professional Amazon Style Frontend

        </p>

    </footer>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
